[package]
name = "dinoco_cli"
version = "0.0.1"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
dotenvy = "0.15.7"
indicatif = "0.18.4"
inquire = "0.9.4"
tokio = { version = "1.50.0", features = ["full", "rt-multi-thread"] }


dinoco_codegen = { path ="../dinoco_codegen" }
dinoco_macros = { path ="../dinoco_macros" }
dinoco_formatter = { path ="../dinoco_formatter" }
colored = "3.1.1"
