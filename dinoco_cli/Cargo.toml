[package]
name = "dinoco_cli"
version = "0.0.1"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.50.0", features = ["full", "rt-multi-thread"] }
dotenvy = "0.15.7"

indicatif = "0.18.4"
inquire = "0.9.4"
colored = "3.1.1"

dinoco_codegen = { path = "../dinoco_codegen" }
dinoco_macros = { path = "../dinoco_macros" }
dinoco_formatter = { path = "../dinoco_formatter" }

dinoco_engine = { path = "../dinoco_engine" }
futures = "0.3.32"
